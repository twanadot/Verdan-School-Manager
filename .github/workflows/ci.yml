name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════
  # Backend: Build & Test (Java 21 + Maven + MySQL)
  # ═══════════════════════════════════════════════
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: verdan_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build & Test
        run: chmod +x mvnw && ./mvnw clean verify -B
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASS: testpass
          JWT_SECRET: ci-test-secret-do-not-use-in-production
          MYSQL_SSL: "false"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: target/surefire-reports/
          retention-days: 14

  # ═══════════════════════════════════════════════
  # Frontend: Typecheck & Build (React + Vite)
  # ═══════════════════════════════════════════════
  frontend:
    name: Frontend Build & Typecheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: verdan-web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: verdan-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

  # ═══════════════════════════════════════════════
  # Deploy: Docker Hub + EC2 (kun ved push til main)
  # ═══════════════════════════════════════════════
  deploy:
    name: Deploy to Production
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/verdan-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/verdan-api:${{ github.sha }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./verdan-web
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/verdan-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/verdan-web:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            docker image prune -f
            sleep 5
            docker ps
